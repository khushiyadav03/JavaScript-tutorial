<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <style>
        :root {
            --bg-start: #09111f;
            --bg-mid: #13233d;
            --bg-end: #3f1d38;
            --card-bg: rgba(11, 17, 31, 0.72);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8f4ee;
            --text-soft: #c7d2e2;
            --accent: #ffb86c;
            --accent-strong: #ff8f5c;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(255, 184, 108, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255, 143, 92, 0.2), transparent 28%),
                linear-gradient(135deg, var(--bg-start), var(--bg-mid) 48%, var(--bg-end));
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.55;
            pointer-events: none;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: 7%;
            left: 10%;
            background: rgba(255, 184, 108, 0.18);
        }

        body::after {
            width: 280px;
            height: 280px;
            right: 8%;
            bottom: 4%;
            background: rgba(135, 177, 255, 0.14);
        }

        .quote-card {
            width: min(720px, 100%);
            padding: 32px 28px;
            border: 1px solid var(--card-border);
            border-radius: 28px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            text-align: left;
            animation: fadeUp 700ms ease;
        }

        .eyebrow {
            margin: 0 0 14px;
            font-family: "Trebuchet MS", sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .quote-mark {
            font-size: 4.2rem;
            line-height: 1;
            color: rgba(255, 184, 108, 0.9);
            margin-bottom: 10px;
        }

        .quote-text {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 3rem);
            line-height: 1.3;
            font-weight: 600;
        }

        .quote-author {
            margin: 18px 0 0;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
            font-family: "Trebuchet MS", sans-serif;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .helper-text {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.95rem;
            font-family: "Trebuchet MS", sans-serif;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: #111827;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 12px 26px rgba(255, 143, 92, 0.28);
            transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(255, 143, 92, 0.34);
            filter: brightness(1.03);
        }

        button:active {
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .quote-card {
                padding: 24px 20px;
                border-radius: 22px;
            }

            .actions {
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="quote-card">
        <p class="eyebrow">Daily Inspiration</p>
        <div class="quote-mark">"</div>
        <h1 class="quote-text">Honesty is the best policy</h1>
        <p class="quote-author">Unknown</p>
        <div class="actions">
            <p class="helper-text">Tap the button to discover a fresh thought.</p>
            <button type="button">New Quote</button>
        </div>
    </main>
    <script src="./script.js"></script>
</body>
</html>
