<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="page-shell">
        <section class="calculator-card">
            <p class="eyebrow">Playful Mini Project</p>
            <h1>Love Calculator</h1>
            <p class="subtitle">
                Enter two names to reveal a fun compatibility score with a sweeter result message.
            </p>

            <form id="loveForm" class="love-form">
                <label class="field">
                    <span>Your Name</span>
                    <input type="text" id="name1" name="name1" placeholder="Enter your name" autocomplete="off">
                </label>

                <label class="field">
                    <span>Partner's Name</span>
                    <input type="text" id="name2" name="name2" placeholder="Enter your partner's name" autocomplete="off">
                </label>

                <button type="submit" class="calculate-btn">Calculate Love</button>
            </form>

            <section class="result-card" id="resultCard" aria-live="polite">
                <p class="result-label">Compatibility Score</p>
                <div class="score-row">
                    <strong id="scoreValue">--%</strong>
                    <span id="scoreBadge">Waiting for names</span>
                </div>
                <p id="resultMessage" class="result-message">
                    Fill in both names to see your result.
                </p>
            </section>
        </section>
    </main>
    
    <script src="./script.js"></script>
</body>
</html>
