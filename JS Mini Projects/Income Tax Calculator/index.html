<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="page-shell">
        <section class="calculator-card">
            <p class="eyebrow">Finance Mini Project</p>
            <h1>Income Tax Calculator</h1>
            <p class="subtitle">
                Enter your annual income to calculate the estimated tax based on the slab rules used in this project.
            </p>

            <form id="taxForm" class="tax-form">
                <label class="field" for="income">
                    <span>Annual Income</span>
                    <input type="number" id="income" name="income" min="0" step="any" placeholder="Enter annual income" required>
                </label>

                <button type="submit" class="calculate-btn">Calculate Tax</button>
            </form>

            <section class="result-card" id="resultCard" aria-live="polite">
                <p class="result-label">Tax Result</p>
                <strong id="taxAmount">Rs 0</strong>
                <p id="resultText" class="result-text">
                    Your estimated tax will appear here after calculation.
                </p>
            </section>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
