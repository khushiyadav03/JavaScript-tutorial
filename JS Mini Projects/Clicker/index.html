<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Sky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="hero-card">
            <div class="hero-copy">
                <p class="eyebrow">Mini Project</p>
                <h1>Balloon Sky</h1>
                <p class="subtitle">Tap anywhere in the sky to launch a balloon, then pop it before it drifts away.</p>
            </div>

            <div class="hud" aria-label="Game stats">
                <article class="stat-card">
                    <span class="stat-label">Score</span>
                    <strong id="scoreValue">0</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Popped</span>
                    <strong id="poppedValue">0</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Missed</span>
                    <strong id="missedValue">0</strong>
                </article>
            </div>

            <div class="controls">
                <p id="statusText" class="status-text">No balloons launched yet. Start by clicking in the sky below.</p>
                <button id="resetButton" class="reset-button" type="button">Reset game</button>
            </div>
        </section>

        <section id="sky" class="sky" aria-label="Balloon play area">
            <div class="sun-glow" aria-hidden="true"></div>
            <div class="cloud cloud-one" aria-hidden="true"></div>
            <div class="cloud cloud-two" aria-hidden="true"></div>
            <div class="cloud cloud-three" aria-hidden="true"></div>
            <p class="sky-hint">Click or tap in the open sky</p>
        </section>
    </main>

    <audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <script src="./script.js"></script>
</body>
</html>
